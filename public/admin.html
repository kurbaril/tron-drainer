<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: system-ui; background: #f5f5f5; padding: 40px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        input, button { padding: 10px; margin: 5px; }
        button { background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Panel</h1>
        <div class="card">
            <h3>Create Invoice</h3>
            <input id="amount" placeholder="Amount USDT"><br>
            <input id="desc" placeholder="Description"><br>
            <button onclick="createInvoice()">Generate</button>
            <div id="link" style="margin-top:10px;"></div>
        </div>
    </div>
    <script>
        async function createInvoice() {
            const res = await axios.post('/api/create-invoice', {
                amount: document.getElementById('amount').value,
                description: document.getElementById('desc').value
            });
            document.getElementById('link').innerHTML = `<a href="${res.data.paymentLink}" target="_blank">${res.data.paymentLink}</a>`;
        }
    </script>
</body>
</html>
